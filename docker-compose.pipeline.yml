services:
  pipeline-init:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - --project
      - esoteric-ebb
      - --init-only
      - --reset
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: "no"

  translate-worker:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - --project
      - esoteric-ebb
      - --worker-role
      - translate
      - --worker-id
      - translate-1
      - --lease-sec
      - "300"
      - --idle-sleep-sec
      - "2"
      - --stage-batch-size
      - "100"
      - --threshold
      - "0.7"
      - --max-retries
      - "3"
      - --low-server-url
      - http://host.docker.internal:11438
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  score-worker:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - --project
      - esoteric-ebb
      - --worker-role
      - score
      - --worker-id
      - score-1
      - --lease-sec
      - "300"
      - --idle-sleep-sec
      - "2"
      - --stage-batch-size
      - "100"
      - --threshold
      - "0.7"
      - --max-retries
      - "3"
      - --score-server-url
      - http://host.docker.internal:4112
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  retranslate-worker:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - --project
      - esoteric-ebb
      - --worker-role
      - retranslate
      - --worker-id
      - retranslate-1
      - --lease-sec
      - "300"
      - --idle-sleep-sec
      - "2"
      - --stage-batch-size
      - "100"
      - --threshold
      - "0.7"
      - --max-retries
      - "3"
      - --retranslate-server-url
      - http://host.docker.internal:4112
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
